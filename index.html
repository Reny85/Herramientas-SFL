<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scanner de Granjas SFL - Reny</title>
    
    <!-- Bootstrap 5.3 y Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    
    <style>
        body {
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.9em;
        }
        .navbar-brand { color: #facc15 !important; font-weight: bold; }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }
        .card-header { 
            border-bottom: 1px solid #333; 
            background-color: #252525; 
            border-radius: 8px 8px 0 0 !important; 
            font-weight: bold;
            color: #facc15;
        }
        .btn-sfl { background-color: #facc15; color: #121212; font-weight: bold; }
        .btn-sfl:hover { background-color: #eab308; }
        .text-sfl { color: #facc15; }
        
        /* Estilos para las listas dinámicas */
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .item-row:last-child { border-bottom: none; }
        .badge-valor { font-size: 0.9em; }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav class="navbar navbar-expand-lg border-bottom border-secondary mb-4 py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex flex-column" href="#">
                <span class="fs-4">SFL Scanner <small class="text-secondary fs-6">by Reny</small></span>
                <span class="text-success font-italic mt-1" style="font-size: 0.8em;">
                    <i class="bi bi-stars"></i> ¡Únete a Sunflower Land, visita granjas y ayuda a limpiarlas!
                </span>
            </a>
            
            <div class="d-flex align-items-center gap-2">
                <input type="number" id="farm-id" class="form-control bg-dark border-secondary text-light" placeholder="Farm ID (Ej: 123456)" style="max-width: 200px;">
                <button class="btn btn-sfl" onclick="buscarGranja()">Escanear</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <!-- Estado de la búsqueda -->
        <div id="info-granja" class="alert alert-dark border-secondary text-center" style="display: none;"></div>

        <!-- CONTENEDOR PRINCIPAL 3 COLUMNAS (Oculto hasta buscar) -->
        <div id="detalles-granja" class="row g-3" style="display: none;">
            
            <!-- COLUMNA IZQUIERDA: Perfil y Bumpkin -->
            <div class="col-12 col-lg-3">
                
                <!-- Perfil de la Granja -->
                <div class="card">
                    <div class="card-header"><i class="bi bi-person-badge"></i> Perfil de Granja</div>
                    <div class="card-body p-3">
                        <h4 class="text-success mb-0" id="g-dueño">-</h4>
                        <small class="text-secondary mb-3 d-block" id="g-nft">-</small>
                        
                        <div class="item-row"><span>Nivel Bumpkin:</span> <span class="fw-bold" id="g-lvl">-</span></div>
                        <div class="item-row"><span>Expansión:</span> <span class="fw-bold" id="g-exp">-</span></div>
                        <div class="item-row"><span>Isla:</span> <span class="fw-bold text-info" id="g-isla">-</span></div>
                        <div class="item-row"><span>Facción:</span> <span class="fw-bold text-warning" id="g-faccion">-</span></div>
                    </div>
                </div>

                <!-- Balances -->
                <div class="card">
                    <div class="card-header"><i class="bi bi-wallet2"></i> Billetera & Balances</div>
                    <div class="card-body p-3" id="g-balances">
                        <!-- Se llena dinámicamente -->
                    </div>
                </div>

            </div>

            <!-- COLUMNA CENTRAL: Inventario Completo -->
            <div class="col-12 col-lg-6">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <span><i class="bi bi-box-seam"></i> Inventario Completo</span>
                        <span class="badge bg-secondary" id="total-items">0 ítems distintos</span>
                    </div>
                    <div class="card-body p-3" style="max-height: 80vh; overflow-y: auto;">
                        <div class="row" id="g-inventario">
                            <!-- Aquí se inyectarán las columnas de ítems dinámicamente -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: Armario / Ropa Equipada y Habilidades -->
            <div class="col-12 col-lg-3">
                
                <!-- Habilidades / Skills -->
                <div class="card">
                    <div class="card-header"><i class="bi bi-star"></i> Habilidades del Bumpkin</div>
                    <div class="card-body p-3">
                        <div class="item-row text-secondary small mb-2"><span>Experiencia Total:</span> <span id="g-xp">0</span></div>
                        <div id="g-skills">
                            <!-- Habilidades dinámicas -->
                        </div>
                    </div>
                </div>

                <!-- Ropa Equipada -->
                <div class="card">
                    <div class="card-header"><i class="bi bi-person-arms-up"></i> Ropa Equipada</div>
                    <div class="card-body p-3" id="g-ropa">
                        <!-- Ropa dinámica -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function fetchResiliente(url) {
            // Intento 1: "Modo Seguro" (Envuelto en JSON) - El más efectivo contra el firewall de Cloudflare
            try {
                const proxySeguro = 'https://api.allorigins.win/get?url=';
                const res = await fetch(proxySeguro + encodeURIComponent(url));
                if (res.ok) {
                    const datosProxy = await res.json();
                    if (datosProxy.contents) {
                        return JSON.parse(datosProxy.contents);
                    }
                }
            } catch (e) {
                console.warn("Falló el Modo Seguro. Intentando proxies alternativos...");
            }

            // Intento 2 y 3: Proxys crudos de emergencia
            const proxys = [
                'https://corsproxy.io/?',
                'https://api.codetabs.com/v1/proxy?quest='
            ];

            for (let proxy of proxys) {
                try {
                    const urlFinal = proxy.includes('corsproxy.io') ? proxy + url : proxy + encodeURIComponent(url);
                    const respuesta = await fetch(urlFinal);
                    if (respuesta.ok) {
                        const datos = await respuesta.json();
                        if (datos && !datos.error) return datos;
                    }
                } catch (e) { 
                    console.warn(`Falló proxy alternativo: ${proxy}`); 
                }
            }
            throw new Error("Todos los servidores proxy están caídos o bloqueados.");
        }

        async function buscarGranja() {
            const id = document.getElementById('farm-id').value;
            const msg = document.getElementById('info-granja');
            const panel = document.getElementById('detalles-granja');
            
            if (!id) {
                msg.style.display = 'block';
                msg.className = 'alert alert-warning border-warning text-center';
                msg.innerText = "¡Epa! Escribe un ID de granja primero.";
                return;
            }

            msg.style.display = 'block';
            msg.className = 'alert alert-info border-info text-center';
            msg.innerText = "Escanenado blockchain...";
            panel.style.display = 'none';

            try {
                // 1. Obtener NFT ID
                const datosId = await fetchResiliente(`https://sfl.world/api/v1/land/info/farm_id/${id}`);
                msg.innerText = `Descargando granja de ${datosId.username}...`;
                
                // 2. Obtener Datos Completos
                const datos = await fetchResiliente(`https://sfl.world/api/v1.1/land/${datosId.nft_id}`);
                console.log("Datos de la granja:", datos);

                // --- LLENAR COLUMNA IZQUIERDA ---
                document.getElementById('g-dueño').innerText = datosId.username || 'Desconocido';
                document.getElementById('g-nft').innerText = `NFT ID: #${datosId.nft_id}`;
                document.getElementById('g-lvl').innerText = datos.bumpkin?.level || '0';
                document.getElementById('g-exp').innerText = datos.land?.level || '0';
                
                // Formatear tipo de isla
                const tipoIsla = datos.land?.type ? datos.land.type.charAt(0).toUpperCase() + datos.land.type.slice(1) + ' Island' : 'N/A';
                document.getElementById('g-isla').innerText = tipoIsla;
                
                document.getElementById('g-faccion').innerText = datos.faction?.name || 'Ninguna';

                // Balances Dinámicos
                let balHTML = '';
                if(datos.balance) {
                    for(let moneda in datos.balance) {
                        let valor = Math.floor(datos.balance[moneda]);
                        balHTML += `<div class="item-row">
                                        <span class="text-capitalize">${moneda.replace('_', ' ')}</span>
                                        <span class="badge bg-success badge-valor">${valor}</span>
                                    </div>`;
                    }
                }
                document.getElementById('g-balances').innerHTML = balHTML || '<small>Sin fondos</small>';

                // --- LLENAR COLUMNA CENTRAL (Inventario) ---
                let invHTML = '';
                let contadorItems = 0;
                if(datos.inventory) {
                    const itemsOrdenados = Object.keys(datos.inventory).sort();
                    
                    for(let item of itemsOrdenados) {
                        let cantidad = Math.floor(datos.inventory[item]);
                        if(cantidad > 0) {
                            contadorItems++;
                            invHTML += `<div class="col-12 col-md-6">
                                            <div class="item-row">
                                                <span class="text-light">${item}</span>
                                                <span class="fw-bold text-warning">${cantidad}</span>
                                            </div>
                                        </div>`;
                        }
                    }
                }
                document.getElementById('g-inventario').innerHTML = invHTML || '<div class="col-12 text-center text-secondary">Inventario vacío</div>';
                document.getElementById('total-items').innerText = `${contadorItems} recursos distintos`;

                // --- LLENAR COLUMNA DERECHA (Bumpkin) ---
                document.getElementById('g-xp').innerText = Math.floor(datos.bumpkin?.experience || 0);
                
                // Skills
                let skillHTML = '';
                if(datos.bumpkin?.skills) {
                    for(let skill in datos.bumpkin.skills) {
                        skillHTML += `<div class="item-row">
                                        <span>${skill}</span>
                                        <span class="text-info">+${datos.bumpkin.skills[skill]}</span>
                                      </div>`;
                    }
                }
                document.getElementById('g-skills').innerHTML = skillHTML || '<small>Sin habilidades</small>';

                // Ropa / Armario
                let ropaHTML = '';
                if(datos.bumpkin?.equipped) {
                    for(let parte in datos.bumpkin.equipped) {
                        ropaHTML += `<div class="item-row">
                                        <span class="text-secondary text-capitalize">${parte}:</span>
                                        <span class="text-end text-light" style="font-size: 0.85em;">${datos.bumpkin.equipped[parte]}</span>
                                      </div>`;
                    }
                }
                document.getElementById('g-ropa').innerHTML = ropaHTML || '<small>Bumpkin desnudo</small>';

                // Mostrar Panel
                msg.style.display = 'none';
                panel.style.display = 'flex';

            } catch (error) {
                console.error(error);
                msg.className = 'alert alert-danger border-danger text-center';
                msg.innerText = "Error: La red falló o el ID no existe.";
            }
        }
    </script>
</body>
</html>
