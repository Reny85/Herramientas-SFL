<!-- Bloque 2: Buscador de Granjas -->
    <div class="card">
        <h2>🚜 Buscar Granja</h2>
        <p>Ingresa el Farm ID para ver la información:</p>
        <input type="number" id="farm-id" placeholder="Ejemplo: 8749547546587388">
        <button onclick="buscarGranja()">Consultar</button>
        
        <div id="info-granja" class="data-text"></div>
        
        <!-- Detalles extra de la granja (Ocultos por defecto) -->
        <div id="detalles-granja" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; color: #e0e0e0;">
            <p><strong>Nivel del Bumpkin:</strong> <span id="lvl-bumpkin"></span></p>
            <p><strong>Expansión Nº:</strong> <span id="expansion-granja"></span></p>
            <p><strong>Isla:</strong> <span id="isla-granja"></span></p>
            <p><strong>Balance:</strong></p>
            <ul>
                <li>🪙 <span id="monedas-granja"></span> Coins</li>
                <li>💎 <span id="gemas-granja"></span> Gems</li>
            </ul>
            <p style="color: #facc15; font-style: italic; margin-top: 15px;">
                ¡Visita esta granja para limpiarla y apoyar a la comunidad!
            </p>
        </div>
    </div>

    <script>
        // ... (Mantén tu función obtenerPrecios() intacta arriba) ...

        async function buscarGranja() {
            const id = document.getElementById('farm-id').value;
            const cuadroTexto = document.getElementById('info-granja');
            const cajaDetalles = document.getElementById('detalles-granja');
            
            if (!id) {
                cuadroTexto.innerText = "¡Epa! Escribe un ID primero.";
                cuadroTexto.style.color = '#facc15';
                cajaDetalles.style.display = 'none';
                return;
            }

            cuadroTexto.innerText = "Buscando en la blockchain...";
            cuadroTexto.style.color = '#e0e0e0';
            cajaDetalles.style.display = 'none';

            try {
                // Consultamos la API con el ID
                const respuesta = await fetch(`https://sfl.world/api/v1/land/info/farm_id/${id}`);
                
                if (!respuesta.ok) throw new Error("Granja no encontrada");
                
                const datos = await respuesta.json();
                
                // Imprimimos todo en la consola para ver cómo viene la estructura exacta
                console.log("Datos completos de la granja:", datos);
                
                // Mostramos el nombre
                cuadroTexto.innerText = `Dueño: ${datos.username || 'Sin nombre'}`;
                cuadroTexto.style.color = '#4ade80';

                // Llenamos los detalles (los nombres de estas variables pueden variar 
                // dependiendo de cómo las mande exactamente la API, revisa tu consola con F12)
                document.getElementById('lvl-bumpkin').innerText = datos.bumpkinLevel || 'N/A';
                document.getElementById('expansion-granja').innerText = datos.expansion || 'N/A';
                document.getElementById('isla-granja').innerText = datos.island || 'N/A';
                
                // Manejo de balances (Asumiendo que vienen dentro de un objeto 'balance')
                if(datos.balance) {
                    document.getElementById('monedas-granja').innerText = datos.balance.coins || '0';
                    document.getElementById('gemas-granja').innerText = datos.balance.gem || '0';
                }

                // Mostramos la caja con la información
                cajaDetalles.style.display = 'block';

            } catch (error) {
                console.error(error);
                cuadroTexto.innerText = 'No se encontró la granja o el ID es inválido.';
                cuadroTexto.style.color = '#f87171';
                cajaDetalles.style.display = 'none';
            }
        }
    </script>
