<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilidades SFL - Reny</title>
    <style>
        /* Estilos básicos para que se vea como un tablero oscuro y moderno */
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            max-width: 800px;
            margin: auto;
        }
        h1 { color: #facc15; } /* Amarillo Sunflower */
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid #333;
        }
        input, button { 
            padding: 10px; 
            margin-top: 10px; 
            border-radius: 5px;
            border: none;
        }
        input { background: #333; color: white; }
        button { background: #facc15; color: #121212; font-weight: bold; cursor: pointer; }
        button:hover { background: #eab308; }
        .data-text { font-size: 1.2em; margin-top: 10px; color: #4ade80; } /* Verde para números */
    </style>
</head>
<body>

    <h1>Tablero de Estadísticas SFL</h1>

    <!-- Bloque 1: Precio del Token -->
    <div class="card">
        <h2>💰 Economía</h2>
        <p>Precio del SFL (Exchange API):</p>
        <div id="precio-sfl" class="data-text">Cargando mercado...</div>
    </div>

    <!-- Bloque 2: Buscador de Granjas -->
    <div class="card">
        <h2>🚜 Buscar Granja</h2>
        <p>Ingresa el Farm ID para ver quién es el dueño:</p>
        <input type="number" id="farm-id" placeholder="Ejemplo: 123456">
        <button onclick="buscarGranja()">Consultar</button>
        <div id="info-granja" class="data-text"></div>
    </div>

    <script>
        // --- 1. FUNCIÓN PARA EL PRECIO ---
        async function obtenerPrecios() {
            try {
                // Usamos la v1.1 que trae precios en USD
                const respuesta = await fetch('https://sfl.world/api/v1.1/exchange');
                const datos = await respuesta.json();
                
                // Extraemos el valor del SFL en USD
                document.getElementById('precio-sfl').innerText = `1 SFL = $${datos.sfl.usd}`;
            } catch (error) {
                console.error("Fallo al traer el precio", error);
                document.getElementById('precio-sfl').innerText = 'Error al conectar con SFL.world';
                document.getElementById('precio-sfl').style.color = '#f87171'; // Rojo de error
            }
        }

        // --- 2. FUNCIÓN PARA BUSCAR LA GRANJA ---
        async function buscarGranja() {
            const id = document.getElementById('farm-id').value;
            const cuadroTexto = document.getElementById('info-granja');
            
            if (!id) {
                cuadroTexto.innerText = "¡Epa! Escribe un ID primero.";
                cuadroTexto.style.color = '#facc15';
                return;
            }

            cuadroTexto.innerText = "Buscando en la blockchain...";
            cuadroTexto.style.color = '#e0e0e0';

            try {
                // Consultamos la Land API específica para el Farm ID
                const respuesta = await fetch(`https://sfl.world/api/v1/land/info/farm_id/${id}`);
                
                if (!respuesta.ok) throw new Error("Granja no encontrada");
                
                const datos = await respuesta.json();
                
                // Mostramos el nombre de usuario asociado a ese ID
                cuadroTexto.innerText = `Username del dueño: ${datos.username}`;
                cuadroTexto.style.color = '#4ade80';

            } catch (error) {
                console.error(error);
                cuadroTexto.innerText = 'No se encontró la granja o el ID es inválido.';
                cuadroTexto.style.color = '#f87171';
            }
        }

        // --- 3. AUTO-EJECUCIÓN ---
        // Llamamos a la función del precio apenas se abre la página
        obtenerPrecios();
    </script>
</body>
</html>
